# =============================================================================
# Hyperledger Fabric Network — Development Configuration
# =============================================================================
#
# This is a minimal Fabric network definition for local development.
# For production, use the full fabric-samples test-network or configure
# your own orderer/peer topology.
#
# Usage:
#   cd blockchain/network
#   docker compose -f docker-compose-fabric.yml up -d
# =============================================================================

version: "3.8"

services:
  peer0.org1.rakshak.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.org1.rakshak.com
    environment:
      - CORE_PEER_ID=peer0.org1.rakshak.com
      - CORE_PEER_ADDRESS=peer0.org1.rakshak.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/msp
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_LOGGING_LEVEL=INFO
    ports:
      - "7051:7051"
    volumes:
      - /var/run:/host/var/run
    networks:
      - fabric-net

  orderer.rakshak.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.rakshak.com
    environment:
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
    ports:
      - "7050:7050"
    networks:
      - fabric-net

networks:
  fabric-net:
    driver: bridge
